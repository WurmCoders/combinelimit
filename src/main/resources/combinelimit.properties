# CombineLimitMod — KaZtheGreat
# Raises the maximum combine weight for items in Wurm Unlimited.
#
# Installation: Place combinelimit.properties and combinelimit/ folder in your server's mods/ directory.
# Requires: ago's WurmServerModLauncher

classname=com.kazthegreat.wurm.combinelimit.CombineLimitMod
classpath=combinelimit/combinelimit.jar

# How many base-weight units can be combined.
# Vanilla = 64 (items can be combined up to 64x their template weight)
# Example: An iron lump weighs 1kg. At 100, you can combine up to 100kg of iron lumps.
combineMultiplier=100

# Minimum weight floor for metal lumps (in kg).
# Vanilla = 64 (metal lumps can always combine to at least 64kg regardless of template weight)
# This ensures small metal lumps (like gold at 0.3kg) can still combine to a useful size.
metalLumpFloorKg=100
